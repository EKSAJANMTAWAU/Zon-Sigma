<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspirasi Zon-Sigma EKSA</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #00264d 0%, #004080 100%);
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 85%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo-container {
            background: white;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .logo-img {
            width: 200px;
            height: auto;
            display: block;
        }
        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 5px 0;
            color: #ffd700;
        }
        .divider {
            width: 60px;
            height: 4px;
            background: #28a745;
            margin: 10px auto;
            border-radius: 10px;
        }
        #quote {
            font-size: 1.3rem;
            font-style: italic;
            margin: 25px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }
        button {
            background: #ffd700;
            color: #00264d;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <!-- Logo EKSA dimasukkan terus ke dalam kod -->
        <img src="https://i.ibb.co/Lz0zZzS/logo-eksa.png" alt="Logo EKSA" class="logo-img">
    </div>
    
    <h1 class="brand-name">ZON SIGMA</h1>
    <div class="divider"></div>
    <div id="quote">Sila tekan butang...</div>
    <button onclick="paparRawak()">KATA MOTIVASI SETERUSNYA</button>
</div>

<script>
    const kataKata = [
        "EKSA: Amalan Budaya Kerja Cemerlang.",
        "Persekitaran kondusif, kerja lebih produktif.",
        "Kebersihan dan kekemasan adalah kunci profesionalisme.",
        "Setiap pagi adalah peluang baru untuk menjadi lebih baik.",
        "Kunci ketenangan adalah melepaskan apa yang tidak boleh dikawal.",
        "Disiplin adalah jambatan antara matlamat dan pencapaian.",
        "Budayakan amalan 5S dalam setiap tugasan anda.",
        "Masa depan anda dicipta oleh apa yang anda lakukan hari ini."
    ];

    function paparRawak() {
        const index = Math.floor(Math.random() * kataKata.length);
        document.getElementById('quote').innerText = `"${kataKata[index]}"`;
    }
    window.onload = paparRawak;
</script>

</body>
</html>
